<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김포남현교회 주보 - 설정</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
h1 { text-align: center; color: #1a237e; margin-bottom: 30px; }
.section-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
h2 { color: #1a237e; border-left: 4px solid #1a237e; padding-left: 10px; margin-top: 0; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; min-height: 100px; resize: vertical; line-height: 1.6; }
.btn-save { display: block; margin: 20px auto; padding: 15px 50px; font-size: 16px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer; }
.btn-save:hover { opacity: 0.85; }
.btn-back { display: inline-block; margin-bottom: 20px; padding: 8px 16px; background: #e8eaf6; color: #1a237e; border-radius: 5px; text-decoration: none; font-size: 14px; }
.saved-msg { text-align: center; color: #2e7d32; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
.help-text { font-size: 12px; color: #777; margin-top: 3px; margin-bottom: 10px; }
</style>
</head>
<body>
<a href="/" class="btn-back">← 주보 작성으로 돌아가기</a>
<h1>⚙️ 고정 문구 설정</h1>

{% if saved %}
<div class="saved-msg">✅ 저장되었습니다!</div>
{% endif %}

<form method="POST">

<div class="section-card">
<h2>⛪ 교회 소개</h2>
<label>교회 소개 문구</label>
<textarea name="church_intro" rows="5">{{settings.church_intro}}</textarea>
</div>

<div class="section-card">
<h2>📋 교단 소개</h2>
<textarea name="church_denomination" rows="3">{{settings.church_denomination}}</textarea>
</div>

<div class="section-card">
<h2>🎯 창립비전</h2>
<div class="help-text">줄바꿈으로 항목 구분</div>
<textarea name="church_vision" rows="5">{{settings.church_vision}}</textarea>
</div>

<div class="section-card">
<h2>👤 교역자</h2>
<div class="help-text">줄바꿈으로 항목 구분</div>
<textarea name="church_pastors" rows="7">{{settings.church_pastors}}</textarea>
</div>

<div class="section-card">
<h2>👥 장로</h2>
<div class="help-text">줄바꿈으로 항목 구분</div>
<textarea name="church_elders" rows="4">{{settings.church_elders}}</textarea>
</div>

<div class="section-card">
<h2>📞 교회 연락처</h2>
<textarea name="church_contact" rows="3">{{settings.church_contact}}</textarea>
</div>

<div class="section-card">
<h2>💰 온라인헌금 안내</h2>
<textarea name="church_offering" rows="2">{{settings.church_offering}}</textarea>
</div>

<div class="section-card">
<h2>🌍 우리교회가 섬기는 선교지</h2>
<div class="help-text">줄바꿈으로 항목 구분</div>
<textarea name="church_mission" rows="8">{{settings.church_mission}}</textarea>
</div>

<div class="section-card">
<h2>✝️ 전도 메시지 (4면)</h2>
<div class="help-text">형식: 제목|설명 (줄바꿈으로 항목 구분)</div>
<textarea name="gospel_items" rows="10">{{settings.gospel_items}}</textarea>
</div>

<button type="submit" class="btn-save">💾 저장</button>
</form>
</body>
</html>
